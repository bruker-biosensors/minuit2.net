name: Minuit2.NET CI/CD Pipeline
run-name: ${{ github.actor }} is creating a new version of Minuit2.NET 🚀

on:
  push:
    tags: ["v*.*.*"]
    branches: ['**']

jobs:
  determine-version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      sem-ver: ${{ steps.determine-version.outputs.GitVersion_SemVer }}
      assembly-sem-ver: ${{ steps.determine-version.outputs.GitVersion_AssemblySemVer }}
      assembly-sem-file-ver: ${{ steps.determine-version.outputs.GitVersion_AssemblySemFileVer }}
      assembly-informational-version: ${{ steps.determine-version.outputs.GitVersion_InformationalVersion }}
      pre-release-label: ${{ steps.determine-version.outputs.PreReleaseLabel }}
    steps:
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine Version
        id: determine-version
        uses: gittools/actions/gitversion/execute@v4
        with:
          configFilePath: GitVersion.yml

  build-windows:
    name: Build for Windows
    needs: determine-version
    runs-on: windows-latest
    strategy: 
      matrix:
        build:
          - {
              "use-openmp": "ON",
              "package-id": "minuit2.net.openmp"
          }
          - {
              "use-openmp": "OFF",
              "package-id": "minuit2.net"
          }
    steps:
      - name: Check Out Repository Code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5

      - name: Build for x86
        run: dotnet build ./minuit2.net/minuit2.net.csproj --configuration Release --runtime win-x86 -p:UseOpenMP=${{ matrix.build.use-openmp }} --no-self-contained

      - name: Build for x64
        run: dotnet build ./minuit2.net/minuit2.net.csproj --configuration Release --runtime win-x64 -p:UseOpenMP=${{ matrix.build.use-openmp }} --no-self-contained

      - name: Build for ARM64
        run: dotnet build ./minuit2.net/minuit2.net.csproj --configuration Release --runtime win-arm64 -p:UseOpenMP=${{ matrix.build.use-openmp }} --no-self-contained

      - name: Test
        run: dotnet test ./test/minuit2.net.UnitTests/minuit2.net.UnitTests.csproj --configuration Release -p:UseOpenMP=${{ matrix.build.use-openmp }}

      - name: Upload C# Assembly
        uses: actions/upload-artifact@v7
        with:
          name: csharp-assembly-${{ matrix.build.package-id }}
          path: ./minuit2.net/bin/Release/net8.0/
          if-no-files-found: error

      - name: Upload Runtime Binaries
        uses: actions/upload-artifact@v7
        with:
          name: windows-binaries-${{ matrix.build.package-id }}
          path: ./minuit2.net/runtimes/
          if-no-files-found: error

  package:
    name: Create NuGet Packages
    needs: [determine-version, build-windows]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build:
          - {
              "use-openmp": "ON",
              "package-id": "minuit2.net.openmp"
          }
          - {
              "use-openmp": "OFF",
              "package-id": "minuit2.net"
          }
    steps:
      - name: Check Out Repository Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5

      - name: Download C# Assembly
        uses: actions/download-artifact@v8
        with:
          name: csharp-assembly-${{ matrix.build.package-id }}
          path: ./minuit2.net/bin/Release/net8.0/

      - name: Download Runtime Binaries
        uses: actions/download-artifact@v8
        with:
          pattern: "*-binaries-${{ matrix.build.package-id }}"
          path: ./minuit2.net/runtimes/
          merge-multiple: true

      - name: Restore Dependencies
        run: dotnet restore ./minuit2.net/minuit2.net.csproj

      - name: Create NuGet
        shell: pwsh
        # Overview of the different versions: https://gist.github.com/jonlabelle/34993ee032c26420a0943b1c9d106cdc
        run: |
          dotnet pack `
            -p:Version=${{ needs.determine-version.outputs.sem-ver }} `
            -p:FileVersion=${{ needs.determine-version.outputs.assembly-sem-file-ver }} `
            -p:AssemblyVersion=${{ needs.determine-version.outputs.assembly-sem-ver }} `
            -p:AssemblyInformationalVersion=${{ needs.determine-version.outputs.assembly-informational-version }} `
            -p:PackageId=${{ matrix.build.package-id }} `
            -p:UseOpenMP=${{ matrix.build.use-openmp }} `
            --no-build `
            --configuration Release `
            --output ./bin `
            --warnaserror `
            --nologo `
            ./minuit2.net/minuit2.net.csproj

      - name: Install dotnet-validate
        run: dotnet tool install --global dotnet-validate --version 0.0.1-preview.537

      - name: Validate NuGet
        run: dotnet-validate package local "./bin/*.nupkg"

      - name: Upload NuGet
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package-${{ matrix.build.package-id }}
          path: ./bin/
          if-no-files-found: error

  publish:
    name: Publish NuGet Packages
    needs: package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package-id: ["minuit2.net", "minuit2.net.openmp"]
    if: github.ref_type == 'tag'
    steps:
      - name: Download NuGet
        uses: actions/download-artifact@v8
        with:
          name: nuget-package-${{ matrix.package-id }}
          path: ./bin/

      - name: Publish NuGet
        run: |
          dotnet nuget push "**/bin/minuit2.net.*.nupkg" --api-key ${{ secrets.PUBLISH_PACKAGE_TOKEN }} --source "https://api.nuget.org/v3/index.json"

  release:
    name: Create GitHub Release
    needs: [publish, determine-version]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      packages: write
      contents: write
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ needs.determine-version.outputs.sem-ver }}"
          prerelease: ${{ needs.determine-version.outputs.pre-release-label != '' }}
